  'Radical Transparency':['Legible','Candid','Stated','Disclose','Declared','Surface','Forthright','Plain','Frank','Evident','Lucid','Signal','Unspun','Visible','Articulate','Precise','Honest','Transparent','Reveal','Declare','Accountable','Readable'],
  Authenticity:['Bedrock','Backbone','Steadfast','Forged','Earned','Proven','Earnest','Intact','Real','True','Tested','Solid','Anchored','Standing','Uncompromised','Durable','Genuine','Weighted','Held','Grounded','Founded','Settled']
};

const VALUE_INFO={
  Conscience:{sub:'active, chosen, intentional',desc:"Not guilt. Not obligation. A deliberate choice made with full awareness. Your pension is a vote — cast every quarter — for the world you intend to live in. The question isn't where your money goes. It's what you've decided it stands for."},
  Liberation:{sub:'breaking free, agency restored',desc:"The incumbent system trapped people — opaque, complex, disempowering. It was managed on your behalf, without your input. LEAM breaks that open. You're no longer a passive recipient. You're in motion, with your money doing what you've told it to do."},
  'Radical Transparency':{sub:'seeing unvarnished truth',desc:"No small print. No managed narrative. No \"trust us.\" Every fee, every holding, every return — visible, legible, and unspun. Honesty as a design decision, not a compliance requirement. If you have to squint to read it, we haven't done our job."},
  Authenticity:{sub:'unfiltered, honest, real',desc:"The name should feel chosen because it's true — not designed to sound true. There is a difference between a brand that is authentic and one that performs authenticity. Authenticity at LEAM shows up in what we refuse to do as much as what we do."}
};

const TONE_POSITIONS=[
  {key:'conviction', label:'Conviction',  sub:'States a belief. Doesn\'t seek approval.',           desc:"The name exists as a declaration. It doesn't ask permission or explain itself — it assumes you already share the belief it carries.",                                          names:['Mandate','Reckoned','Enacted','Accord']},
  {key:'movement',   label:'Movement',    sub:'Something is already in motion.',                    desc:"The name implies a shift underway — not a promise of future change but evidence of change already happening. Energy over authority.",                                       names:['Fracture','Surge','Breach','Reclaim']},
  {key:'precision',  label:'Precision',   sub:'Stripped of decoration. Means exactly what it says.',desc:"No metaphor. No aspiration inflation. The name is as legible as a plain statement of fact. Honesty as aesthetic — the opposite of financial industry language.",           names:['Candid','Legible','Stated','Disclose']},
  {key:'presence',   label:'Presence',    sub:'Has weight. Doesn\'t need to explain itself.',       desc:"The name occupies space without announcing itself. It feels like it has been there before the category existed and will be there after the trends have moved on.",           names:['Bedrock','Tenure','Sovereign','Forged']}
];

const NAME_GALLERY=[
  {group:'Verb owned as noun',sub:'An action becomes an identity — the word does something rather than just describing.',names:[
    {name:'Float',note:'Float (floatapp.com) — cash flow management SaaS. An action (to float a business) compressed into identity. Unexpected lightness in a category that has always felt heavy.'},
    {name:'Drift',note:'Drift (drift.com) — conversational marketing platform. Movement without destination. It finds you rather than demanding you come to it.'},
    {name:'Loom',note:'Loom (loom.com) — async video messaging. To loom large; to weave together. The word carries both presence and creation at the same time.'},
    {name:'Stride',note:'Stride (stridehealth.com) — healthcare benefits for independent workers. Forward motion as identity. The name encodes the belief that agency belongs to you.'},
    {name:'Blend',note:'Blend (blend.com) — mortgage technology platform. A verb that describes the customer\'s experience rather than the product\'s function.'}
  ]},
  {group:'The word the category avoids',sub:'Find what the industry has drained of meaning. Take it back at full weight.',names:[
    {name:'Wise',note:'Wise (wise.com) — international money transfers, formerly TransferWise. The word financial services cannot use without irony. They took it completely and made it credible.'},
    {name:'Earnest',note:'Earnest (earnest.com) — student loan refinancing. Sincere, genuine, without pretence. A word the lending industry has never been able to claim honestly.'},
    {name:'Frank',note:'Frank (frankfinancialaid.com) — college financial aid. The word for directness that financial institutions have institutionally avoided. Named the quality the sector cannot embody.'},
    {name:'Honest',note:'The Honest Company (honest.com) — consumer goods. The name the entire sector could have taken — and didn\'t, because they knew they couldn\'t back it up.'},
    {name:'Plain',note:'Plain (plain.com) — customer support platform. The word for what financial services has always refused to be. Legibility as a radical act, not a feature.'}
  ]},
  {group:'Names that reject the category',sub:'The brand is named against what it isn\'t — the rejection is built into the word.',names:[
    {name:'Monzo',note:'Monzo (monzo.com) — UK challenger bank. Sounds adjacent to "money" but means nothing. Built to not sound like a bank, because it was built to not be one.'},
    {name:'Revolut',note:'Revolut (revolut.com) — global neobank. Revolution + revolving. Names the movement, not the service — the act of overturning, not the account type.'},
    {name:'Atom',note:'Atom Bank (atombank.co.uk) — UK digital bank. The indivisible unit. Not a bank — the thing at the root of everything, the thing that predates banking.'},
    {name:'Starling',note:'Starling Bank (starlingbank.com) — UK challenger bank. Named after a bird that moves in murmurations — collective, distributed, surprising. Entirely outside financial category language.'},
    {name:'Acorns',note:'Acorns (acorns.com) — US micro-investing app. The small thing that becomes the large thing. Named after a natural process, not a financial product.'}
  ]},
  {group:'Compressed beliefs',sub:'The shortest possible version of a truth — one word carrying the full weight.',names:[
    {name:'Vanguard',note:'Vanguard (vanguard.com) — investment firm, founded 1975. Military origin: the troops at the front. The name encodes a belief about leadership position — claimed once and made institutional by weight alone.'},
    {name:'Robinhood',note:'Robinhood (robinhood.com) — commission-free investing. Named after the folk legend of taking from the rich to give to the poor. The entire positioning is in the name. No further explanation required.'},
    {name:'Backbone',note:'Backbone (backbone.com) — mobile gaming controller. Names a quality of character. The name commits to the belief that what you\'re doing matters enough to support it properly.'},
    {name:'Bedrock',note:'Amazon Bedrock (aws.amazon.com/bedrock) — AWS generative AI platform. Foundation before architecture. The thing everything else is built on — solidity without conservatism.'},
    {name:'Manifesto',note:'Manifesto (manifestobeer.co.uk) — UK craft beer brand. A public declaration of intent. Named as a commitment, not a product description. The word the category refuses to use.'}
  ]},
  {group:'Invented and unexpected',sub:'Built from roots, sounds right, or takes a word from somewhere the category never looked.',names:[
    {name:'Figma',note:'Figma (figma.com) — design collaboration tool. No literal meaning. Sounds decisive, ends on a hard consonant. Built to be said at speed in meetings. The name behaves like the product.'},
    {name:'Patagonia',note:'Patagonia (patagonia.com) — outdoor apparel. Named after a remote geographic region. The name carries the ideology — wild, unconquered, worth protecting. Not named after clothing.'},
    {name:'Zopa',note:'Zopa (zopa.com) — UK P2P lending pioneer. ZOPA = Zone Of Possible Agreement. The name encoded the mechanism: lending between people who could reach a deal.'},
    {name:'Arc',note:'Arc (arc.net) — browser by The Browser Company. A geometric shape as identity — describes a direction without naming a destination. Self-contained, precise, impossible to confuse.'},
    {name:'Notion',note:'Notion (notion.so) — productivity platform. A thought, an idea, deliberately unresolved. The product named the state it wants to create in you, not the features it contains.'}
  ]}
];

// ── NAVIGATION ────────────────────────────────
function validate(s){
  if(s===2&&ST.valueRanking.length<2){alert('Rank at least 2 values before continuing.');return false;}
  if(s===8&&VALUES.some(v=>(ST.harvested[v]||[]).length<3)){alert('Harvest at least 3 words per territory before continuing.');return false;}
  if(s===9&&Object.keys(candidates()).length<1){alert('Add at least one name before continuing.');return false;}
  if(s===13&&ST.finalists.length<1){alert('Select at least one finalist.');return false;}
  return true;
}
function goTo(n,unlock){
  if(n<0||n>15)return;
  ST.step=n;
  if(unlock&&!ST.unlocked.includes(n))ST.unlocked.push(n);
  if(n===10){const c=candidates();ST.sortQueue=Object.keys(c).map(name=>({name,value:c[name].value}));ST.sortIndex=0;ST.sortTally={yes:0,maybe:0,no:0};ST.sortQueue.forEach(it=>delete ST.clusters[it.name]);}
  if(n===12){const yes=yesList();if((!ST.stressActive||!yes.includes(ST.stressActive))&&yes.length)ST.stressActive=yes[0];}
  renderAll();
}
function next(){if(!validate(ST.step))return;if(ST.step<15)goTo(ST.step+1,true);}
function prev(){if(ST.step>0)goTo(ST.step-1);}

// ── RAPID FIRE ────────────────────────────────
function rfVote(vote){
  const idx=ST.rfIdx,words=WARMUP_WORDS;
  if(idx>=words.length)return;
  ST.warmup[words[idx]]=vote;
  const dot=document.getElementById('rfd-'+idx);
  if(dot){dot.style.background='#F04F24';dot.style.borderColor='transparent';}
  const y=Object.values(ST.warmup).filter(v=>v==='yes').length,
        m=Object.values(ST.warmup).filter(v=>v==='maybe').length,
        n=Object.values(ST.warmup).filter(v=>v==='no').length;
  ['yes','maybe','no'].forEach(k=>{const el=document.getElementById('rft-'+k);if(el)el.textContent=k==='yes'?y:k==='maybe'?m:n;});
  ST.rfIdx++;
  const wordEl=document.getElementById('rf-word');
  if(!wordEl)return;
  wordEl.style.transition='opacity .18s ease,transform .18s ease';
  wordEl.style.opacity='0';
  wordEl.style.transform=vote==='yes'?'translateX(60px) rotate(5deg)':vote==='no'?'translateX(-60px) rotate(-5deg)':'translateY(-36px) scale(0.85)';
  setTimeout(()=>{
    if(ST.rfIdx>=words.length){
      const stage=document.getElementById('rf-stage');
      if(stage)stage.innerHTML=`<div style="text-align:center;animation:fadeUp .4s ease"><div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#F04F24;font-weight:700;margin-bottom:14px">Complete</div><div style="font-family:'Instrument Serif',serif;font-style:italic;font-size:52px;color:#fff;margin-bottom:18px;line-height:1">Instincts locked.</div><div style="font-size:16px;color:rgba(255,255,255,.6)">${y} Yes &nbsp;·&nbsp; ${m} Maybe &nbsp;·&nbsp; ${n} No</div><div style="font-size:14px;color:rgba(255,255,255,.35);margin-top:12px">Click Continue to proceed.</div></div>`;
      return;
    }
    const w2=document.getElementById('rf-word');if(!w2)return;
    w2.style.transition='none';w2.style.opacity='0';
    w2.style.transform=vote==='yes'?'translateX(-60px) rotate(-5deg)':vote==='no'?'translateX(60px) rotate(5deg)':'translateY(36px) scale(0.85)';
    w2.textContent=words[ST.rfIdx];
    const nd=document.getElementById('rfd-'+ST.rfIdx);if(nd)nd.style.borderColor='rgba(255,255,255,.6)';
    const ct=document.getElementById('rf-counter');if(ct)ct.textContent=`${ST.rfIdx+1} of ${words.length}`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{w2.style.transition='opacity .18s ease,transform .18s ease';w2.style.opacity='1';w2.style.transform='translateX(0) rotate(0deg) scale(1)';}));
  },220);
}

  const avg=document.getElementById('stress-avg');if(avg)avg.textContent=avgScore(name);
}
function setStressFlag(name,key,value){if(!ST.scores[name])ST.scores[name]={};ST.scores[name][key+'_flag']=value;}

// ── FINALISTS ─────────────────────────────────
function toggleFinalist(name,card){
  const i=ST.finalists.indexOf(name);
  if(i!==-1){ST.finalists.splice(i,1);card.style.borderColor='#e5e7eb';card.style.background='#fff';}
  else{ST.finalists.push(name);card.style.borderColor='#F04F24';card.style.background='rgba(240,79,36,.05)';}
}

// ── GENERATE DOC ──────────────────────────────
function generateDoc(){
  const c=candidates();
  const y=Object.entries(ST.warmup).filter(([,v])=>v==='yes').map(([k])=>k);
  const n=Object.entries(ST.warmup).filter(([,v])=>v==='no').map(([k])=>k);
  const tp=TONE_POSITIONS.find(t=>t.key===ST.tonePosition);
  const fin=ST.finalists.map(name=>{
    const tests=STRESS_TESTS.map(t=>{const sc=ST.scores[name]&&ST.scores[name][t.key];const f=ST.scores[name]&&ST.scores[name][t.key+'_flag'];return `    ${t.label}: ${sc||'-'}/5${f?' | '+f:''}`;}).join('\n');
    return `NAME: ${name}\n  Territory: ${c[name]?c[name].value:'—'}\n  Avg score: ${avgScore(name)}/5\n${tests}`;
  }).join('\n\n');
  const all=Object.keys(c).map(n=>`  ${n.padEnd(22)} [${c[n].value}] ${(ST.clusters[n]||'unsorted').toUpperCase()}`).join('\n');
  const line='━'.repeat(48),dash='─'.repeat(40);
  return `LEAM — BRAND NAMING WORKSHOP\n${line}\n${new Date().toLocaleDateString('en-GB',{year:'numeric',month:'long',day:'numeric'})} · Facilitated by Ammunition\n\nPHASE 1 — BRAND ESSENCE\n${dash}\nLead Value: ${ST.valueRanking[0]||'—'}\nValue Priority: ${ST.valueRanking.join(' > ')||'—'}\nPrimary Emotion (name should evoke): ${ST.primaryEmotion||'—'}\nEmotional shift — Before: ${ST.emotionsBefore.join(', ')||'—'}\nEmotional shift — After: ${ST.emotionsAfter.join(', ')||'—'}\nVoice Position: ${tp?tp.label:'—'}\nWords that resonated: ${y.join(', ')||'none'}\nWords that didn\'t: ${n.join(', ')||'none'}\nGuardrails: ${ST.guardrails||'None specified'}\nStakeholder context: ${ST.stakeholders||'None specified'}\n\nFUTURE AMBITION\n${dash}\n${ST.ambition1?'Most _______ platform: '+ST.ambition1:''}\n${ST.ambition2?'Changed _______: '+ST.ambition2:''}\n${ST.ambition3?'Made people feel _______: '+ST.ambition3:''}\n\nWHAT WE\'RE REJECTING\n${dash}\nNot: ${ST.rejections.join(', ')||'—'}\nSo LEAM is: ${ST.notStatement||'—'}\n\nPHASE 2 — FULL NAME POOL\n${dash}\n${all||'  None'}\n\nPHASE 3 — STRESS TEST RESULTS\n${dash}\n${fin||'No stress tests completed.'}\n\nPHASE 4 — DECISION\n${dash}\nFinalists: ${ST.finalists.join(', ')||'None selected'}\n\nRationale:\n${ST.rationale||'None provided.'}\n\nNEXT ACTIONS\n${dash}\n1. Trademark search (UKIPO) for each finalist\n2. Domain availability: .com, .co.uk, .io\n3. Set each name at hero scale in the LEAM typeface — live with them for 48 hours\n4. Stakeholder alignment session\n5. FCA entity name compatibility check\n\n${line}\nAmmunition — Growth. No Matter What.™`;
}
function downloadDoc(){const blob=new Blob([window._wsDoc||generateDoc()],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='leam-naming-workshop.txt';a.click();}

// ── SAVE PROGRESS ─────────────────────────────
function saveProgress(){
  const lines=['LEAM — NAMING WORKSHOP (PROGRESS SAVE)','='.repeat(44),''];
  const y=Object.entries(ST.warmup).filter(([,v])=>v==='yes').map(([k])=>k);
  const m=Object.entries(ST.warmup).filter(([,v])=>v==='maybe').map(([k])=>k);
  const n=Object.entries(ST.warmup).filter(([,v])=>v==='no').map(([k])=>k);
  if(y.length||m.length||n.length){lines.push('Rapid Fire:');lines.push(`  Yes: ${y.join(', ')||'none'}`);lines.push(`  Maybe: ${m.join(', ')||'none'}`);lines.push(`  No: ${n.join(', ')||'none'}`);lines.push('');}
  if(ST.valueRanking.length)lines.push('Value Priority: '+ST.valueRanking.join(' > '),'');
  if(ST.primaryEmotion)lines.push('Primary Emotion: '+ST.primaryEmotion,'');
  if(ST.tonePosition){const tp=TONE_POSITIONS.find(t=>t.key===ST.tonePosition);lines.push('Voice Position: '+(tp?tp.label:ST.tonePosition),'');}
  if(ST.guardrails||ST.stakeholders){lines.push('Guardrails: '+ST.guardrails||'none');lines.push('Stakeholder context: '+ST.stakeholders||'none');lines.push('');}
  if(ST.ambition1||ST.ambition2||ST.ambition3){lines.push('Future Ambition:');if(ST.ambition1)lines.push('  '+ST.ambition1);if(ST.ambition2)lines.push('  '+ST.ambition2);if(ST.ambition3)lines.push('  '+ST.ambition3);lines.push('');}
  if(ST.rejections.length||ST.notStatement){lines.push('Not: '+ST.rejections.join(', '));if(ST.notStatement)lines.push('So LEAM is: '+ST.notStatement);lines.push('');}
  VALUES.forEach(v=>{const h=ST.harvested[v];if(h&&h.length)lines.push(v+' (harvested): '+h.join(', '));});
  const c=candidates();if(Object.keys(c).length){lines.push('');lines.push('Name Pool:');VALUES.forEach(v=>{const ns=(ST.slots[v]||[]).filter(s=>s&&s.trim());if(ns.length)lines.push('  '+v+': '+ns.join(', '));});}
  if(ST.finalists.length)lines.push('','Finalists: '+ST.finalists.join(', '));
  lines.push('','Saved: '+new Date().toLocaleString('en-GB'),'Step: '+ST.step+' / 15');
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='leam-workshop-progress.txt';a.click();
}

// ── BOOT ──────────────────────────────────────
function renderAll(){renderShell();R[ST.step]();document.getElementById('content').scrollTop=0;}
renderAll();
</script>
